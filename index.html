<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoseDrop - P2P File Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Custom Dark Rose Theme Variables */
        :root {
            --color-rose-dark: #110307;
            --color-rose-mid: #310612;
            --color-rose-bright: #f43f5e;
            --color-rose-glow: rgba(244, 63, 94, 0.2);
        }

        body {
            background-color: var(--color-rose-dark);
            color: #fecdd3;
            overflow-x: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* Hardware accelerated Background Canvas */
        #rainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Premium Pulsing Radar Animation */
        .radar-box {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--color-rose-bright);
            border-radius: 50%;
            opacity: 0;
            animation: radarPulse 3s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
            will-change: transform, opacity;
        }

        .radar-circle:nth-child(2) { animation-delay: 1s; }
        .radar-circle:nth-child(3) { animation-delay: 2s; }

        @keyframes radarPulse {
            0% { transform: scale(0.4); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Glassmorphism Accents */
        .glass-panel {
            background: rgba(49, 6, 18, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 63, 94, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen justify-between items-center p-4">

    <canvas id="rainCanvas"></canvas>

    <main class="w-full max-w-md my-auto flex flex-col items-center">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-rose-600 drop-shadow-md">
                ROSEDROP
            </h1>
            <p class="text-xs text-rose-300/60 mt-1 uppercase tracking-widest">Secure P2P WebRTC File Sharing</p>
        </div>

        <div class="glass-panel w-full rounded-2xl p-5 mb-6 text-center transition-all duration-300">
            <div class="text-sm text-rose-300/80 mb-2">Your Sharing Key</div>
            <div id="peer-id-display" class="font-mono text-lg bg-black/40 text-rose-400 py-2 px-4 rounded-xl border border-rose-950/50 break-all select-all cursor-pointer dynamic-glow">
                Connecting to network...
            </div>
            <div id="status-text" class="text-xs text-rose-400/50 mt-2 flex items-center justify-center gap-2">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-ping"></span> Initializing node...
            </div>
        </div>

        <div class="glass-panel w-full rounded-2xl p-8 flex flex-col items-center justify-center min-h-[300px] mb-6">
            
            <div id="searching-view" class="flex flex-col items-center justify-center">
                <div class="radar-box mb-6">
                    <div class="radar-circle"></div>
                    <div class="radar-circle"></div>
                    <div class="radar-circle"></div>
                    <div class="w-20 h-20 bg-gradient-to-br from-rose-500 to-rose-700 rounded-full flex items-center justify-center shadow-lg shadow-rose-500/30 z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
                
                <div class="w-full flex flex-col gap-2 mt-2">
                    <input type="text" id="remote-id-input" placeholder="Enter recipient's key" class="w-full bg-black/40 border border-rose-900/50 rounded-xl px-4 py-2.5 text-center font-mono text-sm text-rose-200 placeholder-rose-900 focus:outline-none focus:border-rose-500 transition-colors">
                    <button id="connect-btn" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-medium text-sm py-2.5 px-4 rounded-xl transition-all active:scale-[0.98]">
                        Connect to Peer
                    </button>
                </div>
            </div>

            <div id="transfer-view" class="hidden w-full flex flex-col items-center">
                <div class="w-16 h-16 bg-emerald-500/20 border border-emerald-500/40 rounded-full flex items-center justify-center text-emerald-400 mb-4 animate-bounce">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0114 0z" />
                    </svg>
                </div>
                <p class="text-sm font-semibold text-emerald-400 mb-6">Connected securely to Peer</p>

                <label class="w-full flex flex-col items-center justify-center px-4 py-6 bg-rose-950/20 border-2 border-dashed border-rose-900/60 rounded-xl cursor-pointer hover:border-rose-500/50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-rose-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <span class="text-xs text-rose-300">Click to choose a file to send</span>
                    <input type='file' id="file-input" class="hidden" />
                </label>

                <div id="progress-container" class="hidden w-full mt-4 bg-black/30 border border-rose-950 p-3 rounded-xl">
                    <div id="progress-filename" class="text-xs text-rose-300 truncate mb-1 font-mono">file.zip</div>
                    <div class="w-full bg-rose-950 rounded-full h-1.5 overflow-hidden">
                        <div id="progress-bar" class="bg-rose-500 h-1.5 w-0 transition-all duration-100"></div>
                    </div>
                </div>

                <button id="disconnect-btn" class="mt-8 text-xs text-rose-500/60 hover:text-rose-400 transition-colors underline decoration-dotted">
                    Disconnect Session
                </button>
            </div>

        </div>
    </main>

    <footer class="w-full max-w-xs mb-4">
        <div class="border border-rose-900/40 bg-rose-950/10 backdrop-blur-md rounded-xl py-2 px-4 text-center">
            <span class="text-xs tracking-widest text-rose-400/40 uppercase font-medium">
                Made by <span class="text-rose-400 font-bold tracking-normal lowercase font-mono">shahriyaah</span>
            </span>
        </div>
    </footer>

    <script>
        // --- 1. Rose Rain Drop Visual Effect ---
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const columns = Math.floor(width / 25); 
        const drops = Array(columns).fill(1);

        function drawBackgroundRain() {
            ctx.fillStyle = 'rgba(17, 3, 7, 0.12)'; // Fades frame slightly to create a trail effect
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'rgba(244, 63, 94, 0.15)'; // Muted rose color for drops
            ctx.font = '11px monospace';

            for (let i = 0; i < drops.length; i++) {
                // Using abstract matrix-like bits optimized for performance
                const text = Math.random() > 0.5 ? "0" : "1";
                const x = i * 25;
                const y = drops[i] * 25;

                ctx.fillText(text, x, y);

                if (y > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(drawBackgroundRain);
        }
        requestAnimationFrame(drawBackgroundRain);


        // --- 2. WebRTC PeerJS Functional Code ---
        let peer = null;
        let activeConn = null;

        const peerIdDisplay = document.getElementById('peer-id-display');
        const statusText = document.getElementById('status-text');
        const searchingView = document.getElementById('searching-view');
        const transferView = document.getElementById('transfer-view');
        const remoteIdInput = document.getElementById('remote-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const fileInput = document.getElementById('file-input');
        const progressContainer = document.getElementById('progress-container');
        const progressFilename = document.getElementById('progress-filename');
        const progressBar = document.getElementById('progress-bar');

        // Automatically Initialize PeerJS on load
        function initPeer() {
            // Generates clean random room string to bypass generic IDs
            const genShortId = Math.random().toString(36).substring(2, 7).toUpperCase();
            
            peer = new Peer(`ROSE-${genShortId}`, {
                debug: 1
            });

            peer.on('open', (id) => {
                peerIdDisplay.innerText = id;
                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Online & Waiting`;
            });

            peer.on('error', (err) => {
                console.error(err);
                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-600"></span> Error connecting network`;
            });

            // Handle incoming data connections (Receiver side)
            peer.on('connection', (conn) => {
                handleConnection(conn);
            });
        }

        function handleConnection(conn) {
            activeConn = conn;
            
            // UI Toggle to Connected State
            searchingView.classList.add('hidden');
            transferView.classList.remove('hidden');
            statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Active P2P Session`;

            activeConn.on('data', (data) => {
                // If received object contains file data metadata
                if (data.file) {
                    processIncomingFile(data);
                }
            });

            activeConn.on('close', () => {
                resetUI();
            });
        }

        // Connect button handler (Sender side)
        connectBtn.addEventListener('click', () => {
            const remoteId = remoteIdInput.value.trim();
            if (!remoteId) return alert("Please input a valid key first!");

            statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> Routing connection...`;
            const conn = peer.connect(remoteId);
            handleConnection(conn);
        });

        // Disconnect handler
        disconnectBtn.addEventListener('click', () => {
            if (activeConn) activeConn.close();
            resetUI();
        });

        // UI Reset Utilities
        function resetUI() {
            activeConn = null;
            searchingView.classList.remove('hidden');
            transferView.classList.add('hidden');
            progressContainer.classList.add('hidden');
            remoteIdInput.value = '';
            statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Online & Waiting`;
        }

        // File Selection and P2P Sender Execution
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !activeConn) return;

            progressContainer.classList.remove('hidden');
            progressFilename.innerText = `Sending: ${file.name}`;
            progressBar.style.width = '30%'; // Fake initial state for processing responsiveness

            const reader = new FileReader();
            reader.onload = function(event) {
                const buffer = event.target.result;
                
                // Pack metadata alongside ArrayBuffer data natively supported by PeerJS chunking
                activeConn.send({
                    file: buffer,
                    filename: file.name,
                    filetype: file.type
                });

                progressBar.style.width = '100%';
                setTimeout(() => {
                    alert('File sent successfully!');
                    progressContainer.classList.add('hidden');
                }, 400);
            };
            
            reader.readAsArrayBuffer(file);
        });

        // Incoming file assembler UI handler
        function processIncomingFile(data) {
            progressContainer.classList.remove('hidden');
            progressFilename.innerText = `Received: ${data.filename}`;
            progressBar.style.width = '100%';

            // Creating seamless local download link immediately upon streaming receipt
            const blob = new Blob([data.file], { type: data.filetype });
            const url = URL.createObjectURL(blob);
            
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            downloadLink.download = data.filename;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

            setTimeout(() => {
                progressContainer.classList.add('hidden');
            }, 1000);
        }

        // Initialize App on window mount
        initPeer();
    </script>
</body>
</html>
