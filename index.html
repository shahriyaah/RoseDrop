<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoseDrop - P2P File Transfer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- QRCode Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- HTML5 QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --color-rose-dark: #110307;
            --color-rose-mid: #310612;
            --color-rose-bright: #f43f5e;
        }

        body {
            background-color: var(--color-rose-dark);
            color: #fecdd3;
            overflow-x: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #rainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Radar Animation */
        .radar-box {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--color-rose-bright);
            border-radius: 50%;
            opacity: 0;
            animation: radarPulse 3s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
            will-change: transform, opacity;
        }
        .radar-circle:nth-child(2) { animation-delay: 1s; }
        .radar-circle:nth-child(3) { animation-delay: 2s; }

        @keyframes radarPulse {
            0% { transform: scale(0.4); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Send Animation (Outward Burst) */
        .animate-send {
            animation: sendFly 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes sendFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-20px) scale(1.1); opacity: 0.5; color: #f43f5e; }
            100% { transform: translateY(-40px) scale(0.8); opacity: 0; }
        }

        /* Receive Animation (Inward Catch) */
        .animate-receive {
            animation: receiveCatch 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes receiveCatch {
            0% { transform: translateY(-40px) scale(0.5); opacity: 0; }
            50% { transform: translateY(-10px) scale(1.1); opacity: 0.8; color: #10b981; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .glass-panel {
            background: rgba(49, 6, 18, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        /* QR Adjustments to match Dark Rose look */
        #qrcode img {
            border: 6px solid #fff;
            border-radius: 8px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen justify-between items-center p-4">

    <canvas id="rainCanvas"></canvas>

    <main class="w-full max-w-md my-auto flex flex-col items-center">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-rose-600 drop-shadow-md">
                ROSEDROP
            </h1>
            <p class="text-xs text-rose-300/60 mt-1 uppercase tracking-widest">P2P File Transfer</p>
        </div>

        <!-- Connection Status & QR Key Display -->
        <div class="glass-panel w-full rounded-2xl p-5 mb-5 text-center">
            <div class="text-sm text-rose-300/80 mb-2">Your Sharing Key</div>
            <div id="peer-id-display" class="font-mono text-lg bg-black/40 text-rose-400 py-2 px-4 rounded-xl border border-rose-950/50 break-all select-all cursor-pointer mb-3">
                Connecting...
            </div>
            
            <!-- Target for Generated QR Code -->
            <div id="qrcode" class="flex justify-center my-3 hidden opacity-90 transition-opacity duration-300"></div>

            <div id="status-text" class="text-xs text-rose-400/50 mt-2 flex items-center justify-center gap-2">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-ping"></span> Initializing node...
            </div>
        </div>

        <!-- Dynamic Action Panel -->
        <div class="glass-panel w-full rounded-2xl p-6 flex flex-col items-center justify-center min-h-[320px] mb-6">
            
            <!-- VIEW 1: Searching/Idle Form (Default) -->
            <div id="searching-view" class="w-full flex flex-col items-center">
                <div class="radar-box mb-4">
                    <div class="radar-circle"></div>
                    <div class="radar-circle"></div>
                    <div class="radar-circle"></div>
                    <div class="w-16 h-16 bg-gradient-to-br from-rose-500 to-rose-700 rounded-full flex items-center justify-center shadow-lg shadow-rose-500/30 z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
                
                <!-- Manual Inputs & Camera Scanner Trigger -->
                <div class="w-full flex flex-col gap-2">
                    <input type="text" id="remote-id-input" placeholder="Enter recipient's key" class="w-full bg-black/40 border border-rose-900/50 rounded-xl px-4 py-2.5 text-center font-mono text-sm text-rose-200 placeholder-rose-900 focus:outline-none focus:border-rose-500">
                    
                    <div class="grid grid-cols-3 gap-2">
                        <button id="connect-btn" class="col-span-2 bg-rose-600 hover:bg-rose-700 text-white font-medium text-sm py-2.5 px-4 rounded-xl transition-all active:scale-[0.98]">
                            Connect
                        </button>
                        <button id="scan-btn" class="col-span-1 bg-zinc-800 hover:bg-zinc-700 border border-rose-950 text-rose-300 font-medium text-sm py-2.5 flex items-center justify-center rounded-xl transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M4 8h4M4 4h4m12 0h-4" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Hidden Camera Scanner View Box -->
                <div id="scanner-container" class="w-full hidden mt-4 bg-black/50 p-2 rounded-xl border border-rose-900/40">
                    <div id="reader" class="w-full overflow-hidden rounded-lg"></div>
                    <button id="stop-scan-btn" class="w-full mt-2 text-xs text-rose-400 py-1 bg-rose-950/40 rounded-md">Cancel Camera Scan</button>
                </div>
            </div>

            <!-- VIEW 2: Active P2P Session File Area -->
            <div id="transfer-view" class="hidden w-full flex flex-col items-center">
                
                <!-- Active Animation Graphic Center -->
                <div class="w-20 h-20 bg-rose-950/40 border border-rose-800/40 rounded-full flex items-center justify-center mb-4 text-rose-400">
                    <div id="direction-icon" class="transition-transform duration-300">
                        <!-- Standard Idle Link Vector -->
                        <svg id="icon-idle" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        </svg>
                    </div>
                </div>
                <p id="session-status-lbl" class="text-sm font-semibold text-rose-300 mb-6">Connected Peer</p>

                <!-- Input Trigger Area -->
                <label class="w-full flex flex-col items-center justify-center px-4 py-6 bg-rose-950/20 border-2 border-dashed border-rose-900/60 rounded-xl cursor-pointer hover:border-rose-500/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-rose-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <span class="text-xs text-rose-300">Choose a file to share directly</span>
                    <input type='file' id="file-input" class="hidden" />
                </label>

                <!-- Transfer Tracking Panel -->
                <div id="progress-container" class="hidden w-full mt-4 bg-black/30 border border-rose-950 p-3 rounded-xl">
                    <div id="progress-filename" class="text-xs text-rose-300 truncate mb-1 font-mono">Processing...</div>
                    <div class="w-full bg-rose-950 rounded-full h-1.5 overflow-hidden">
                        <div id="progress-bar" class="bg-rose-500 h-1.5 w-0 transition-all duration-100"></div>
                    </div>
                </div>

                <button id="disconnect-btn" class="mt-8 text-xs text-rose-500/60 hover:text-rose-400 transition-colors underline decoration-dotted">
                    Disconnect Session
                </button>
            </div>

        </div>
    </main>

    <!-- Custom Box Footer -->
    <footer class="w-full max-w-xs mb-4">
        <div class="border border-rose-900/40 bg-rose-950/10 backdrop-blur-md rounded-xl py-2 px-4 text-center">
            <span class="text-xs tracking-widest text-rose-400/40 uppercase font-medium">
                Made by <span class="text-rose-400 font-bold tracking-normal lowercase font-mono">shahriyaah</span>
            </span>
        </div>
    </footer>

    <script>
        // --- 1. Rose Matrix Rain Effect ---
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const columns = Math.floor(width / 25); 
        const drops = Array(columns).fill(1);

        function drawBackgroundRain() {
            ctx.fillStyle = 'rgba(17, 3, 7, 0.12)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(244, 63, 94, 0.15)';
            ctx.font = '11px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = Math.random() > 0.5 ? "0" : "1";
                ctx.fillText(text, i * 25, drops[i] * 25);
                if (drops[i] * 25 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
            requestAnimationFrame(drawBackgroundRain);
        }
        requestAnimationFrame(drawBackgroundRain);

        // --- 2. WebRTC & QR App State Logic ---
        let peer = null;
        let activeConn = null;
        let html5QrcodeScanner = null;

        const peerIdDisplay = document.getElementById('peer-id-display');
        const statusText = document.getElementById('status-text');
        const qrcodeContainer = document.getElementById('qrcode');
        
        const searchingView = document.getElementById('searching-view');
        const transferView = document.getElementById('transfer-view');
        const remoteIdInput = document.getElementById('remote-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const scanBtn = document.getElementById('scan-btn');
        const scannerContainer = document.getElementById('scanner-container');
        const stopScanBtn = document.getElementById('stop-scan-btn');
        
        const directionIcon = document.getElementById('direction-icon');
        const fileInput = document.getElementById('file-input');
        const progressContainer = document.getElementById('progress-container');
        const progressFilename = document.getElementById('progress-filename');
        const progressBar = document.getElementById('progress-bar');
        const disconnectBtn = document.getElementById('disconnect-btn');

        function initPeer() {
            const genShortId = Math.random().toString(36).substring(2, 7).toUpperCase();
            const fullPeerId = `ROSE-${genShortId}`;
            
            peer = new Peer(fullPeerId, { debug: 1 });

            peer.on('open', (id) => {
                peerIdDisplay.innerText = id;
                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Online & Waiting`;
                
                // Fire and render the custom matching QR Code inside display box
                qrcodeContainer.innerHTML = "";
                qrcodeContainer.classList.remove('hidden');
                new QRCode(qrcodeContainer, {
                    text: id,
                    width: 128,
                    height: 128,
                    colorDark : "#310612",
                    colorLight : "#ffffff"
                });
            });

            peer.on('error', (err) => {
                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-600"></span> Network routing conflict`;
            });

            peer.on('connection', (conn) => { handleConnection(conn); });
        }

        function handleConnection(conn) {
            activeConn = conn;
            
            // Toggle Views gracefully
            searchingView.classList.add('hidden');
            qrcodeContainer.classList.add('hidden'); // Hide QR while transferring
            transferView.classList.remove('hidden');
            statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Secure P2P Link Established`;
            
            stopCameraScanner(); // Ensure camera processes shut off safely on connection

            activeConn.on('data', (data) => {
                if (data.file) {
                    triggerReceiveAnimation();
                    processIncomingFile(data);
                }
            });

            activeConn.on('close', () => { resetUI(); });
        }

        connectBtn.addEventListener('click', () => {
            const remoteId = remoteIdInput.value.trim().toUpperCase();
            if (!remoteId) return alert("Please specify a pairing key!");
            statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> Calling destination...`;
            handleConnection(peer.connect(remoteId));
        });

        // --- 3. Dynamic Visual Animations Setup ---
        function triggerSendAnimation() {
            directionIcon.className = "animate-send";
            directionIcon.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
            `;
        }

        function triggerReceiveAnimation() {
            directionIcon.className = "animate-receive";
            directionIcon.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            `;
        }

        function clearActionAnimations() {
            directionIcon.className = "transition-transform duration-300";
            directionIcon.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
            `;
        }

        // --- 4. File I/O Management Engine ---
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !activeConn) return;

            progressContainer.classList.remove('hidden');
            progressFilename.innerText = `Preparing: ${file.name}`;
            
            triggerSendAnimation();

            const reader = new FileReader();
            reader.onload = function(event) {
                activeConn.send({
                    file: event.target.result,
                    filename: file.name,
                    filetype: file.type
                });

                progressBar.style.width = '100%';
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                    clearActionAnimations();
                }, 1200);
            };
            reader.readAsArrayBuffer(file);
        });

        function processIncomingFile(data) {
            progressContainer.classList.remove('hidden');
            progressFilename.innerText = `Assembling file...`;
            progressBar.style.width = '100%';

            const blob = new Blob([data.file], { type: data.filetype });
            const url = URL.createObjectURL(blob);
            
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            downloadLink.download = data.filename;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

            setTimeout(() => {
                progressContainer.classList.add('hidden');
                clearActionAnimations();
            }, 1200);
        }

        // --- 5. Integrated Live Scanner Functionality ---
        scanBtn.addEventListener('click', () => {
            scannerContainer.classList.remove('hidden');
            scanBtn.classList.add('hidden');
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 200, height: 200 } },
                (decodedText) => {
                    remoteIdInput.value = decodedText.trim().toUpperCase();
                    stopCameraScanner();
                    connectBtn.click(); // Trigger auto handshake immediately
                },
                (errorMessage) => { /* Silently iterate to bypass frame mismatch logging */ }
            ).catch(err => {
                alert("Camera permission denied or unavailable.");
                stopCameraScanner();
            });
        });

        function stopCameraScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                    scannerContainer.classList.add('hidden');
                    scanBtn.classList.remove('hidden');
                }).catch(err => console.log(err));
            } else {
                scannerContainer.classList.add('hidden');
                scanBtn.classList.remove('hidden');
            }
        }

        stopScanBtn.addEventListener('click', stopCameraScanner);
        disconnectBtn.addEventListener('click', () => { if (activeConn) activeConn.close(); resetUI(); });

        function resetUI() {
            activeConn = null;
            searchingView.classList.remove('hidden');
            qrcodeContainer.classList.remove('hidden');
            transferView.classList.add('hidden');
            progressContainer.classList.add('hidden');
            remoteIdInput.value = '';
            clearActionAnimations();
            statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Online & Waiting`;
        }

        initPeer();
    </script>
</body>
</html>
